<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi QR Code - CPM Control System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }
        .card-absensi {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #dee2e6;
            background-color: #fafafa;
        }
        .btn-status {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">
            
            <img src="https://raw.githubusercontent.com/absensicpm-sketch/ScanQR/main/logo.png" alt="Logo CPM" class="img-fluid mb-3" style="max-height: 80px;">
            <h4 class="fw-bold text-dark mb-1">CPM CONTROL SYSTEM</h4>
            <p class="text-muted mb-4">E-Absensi QR Karyawan</p>

            <div class="card card-absensi p-4 bg-white mb-3">
                
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Area Penempatan / Cabang:</label>
                    <select id="areaPenempatan" class="form-select">
                        <option value="HARCO MANGGA DUA">HARCO MANGGA DUA</option>
                        <option value="HONDA MUGEN">HONDA MUGEN</option>
                        <option value="WERKSPACE">WERKSPACE</option>
                        <option value="PIK">ALADDIN PIK2</option>
                        <option value="SERPONG">ALADDIN SERPONG</option>
                    </select>
                </div>

                <div class="row mb-4">
                    <div class="col">
                        <input type="radio" class="btn-check" name="tipeAbsen" id="absenMasuk" value="MASUK" checked>
                        <label class="btn btn-outline-success btn-status w-100" for="absenMasuk">☀️ MASUK</label>
                    </div>
                    <div class="col">
                        <input type="radio" class="btn-check" name="tipeAbsen" id="absenPulang" value="PULANG">
                        <label class="btn btn-outline-danger btn-status w-100" for="absenPulang">🌙 PULANG</label>
                    </div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Keterangan (Opsional):</label>
                    <input type="text" id="keterangan" class="form-control" placeholder="Isi jika terlambat / tugas luar">
                </div>

                <div class="mb-3">
                    <div id="reader"></div>
                </div>

                <div id="statusAlert" class="alert d-none" role="alert"></div>

            </div>
            
            <p class="text-muted small">© 2026 CPM Management System</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    // URL Web App Apps Script Anda
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyj4Ev8Hy4OUdYyyRNyKHLf-BOQoqy1ZwEjv8zeQ6zij83LQ9vuqDN4DwNXnoNoqGAV8g/exec";

    let html5QrcodeScanner;

    // Fungsi mengambil snapshot dari video kamera scanner yang sedang aktif berjalan
    function ambilFotoDariScanner() {
        try {
            const video = document.querySelector('#reader video');
            if (!video) return "";
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.7); // Output berupa Base64 string
        } catch (e) {
            console.error("Gagal mengambil snapshot kamera:", e);
            return "";
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        // 1. Ambil foto snapshot wajah tepat saat QR code terdeteksi
        const fotoData = ambilFotoDariScanner();
        
        // 2. Matikan scanner sementara supaya tidak melakukan double post data
        html5QrcodeScanner.clear();
        
        const area = document.getElementById("areaPenempatan").value;
        const tipe = document.querySelector('input[name="tipeAbsen"]:checked').value;
        const ket = document.getElementById("keterangan").value;

        tampilkanPesan("Sedang memproses absensi, mohon tunggu...", "info");

        // 3. Kirim data absensi ke Google Sheets melalui Apps Script
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idKaryawan: decodedText.trim(),
                tipeAbsen: tipe,
                areaPenempatan: area,
                keterangan: ket,
                foto: fotoData
            })
        })
        .then(() => {
            tampilkanPesan(`✅ BERHASIL! Absen ${tipe} Berhasil Tercatat.`, "success");
            document.getElementById("keterangan").value = ""; // Reset form keterangan
            
            // Nyalakan kembali scanner setelah jeda 3 detik untuk antrean karyawan berikutnya
            setTimeout(mulaiScanner, 3000);
        })
        .catch(err => {
            tampilkanPesan("❌ Gagal Mengirim Absensi: " + err, "danger");
            setTimeout(mulaiScanner, 3000);
        });
    }

    function tampilkanPesan(pesan, tipe) {
        const alertBox = document.getElementById("statusAlert");
        alertBox.className = `alert alert-${tipe} mt-2`;
        alertBox.innerHTML = pesan;
        alertBox.classList.remove("d-none");
    }

    function mulaiScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            rememberLastUsedCamera: true
        }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanError);
    }

    function onScanError(errorMessage) {
        // Diabaikan untuk mencegah spam log pencarian frame QR di console browser
    }

    // Jalankan sistem scanner begitu halaman selesai dimuat
    window.onload = function() {
        mulaiScanner();
    };
</script>
</body>
</html>
