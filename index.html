<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Control System - Portal Resmi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden-section { display: none; }
        .camera-container { position: relative; width: 100%; max-width: 340px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #webcam-preview { width: 100%; transform: scaleX(-1); background-color: #222; height: 260px; object-fit: cover; }
        .camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 20px solid rgba(0,0,0,0.4); box-sizing: border-box; pointer-events: none; }
        .camera-grid { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; border: 2px dashed rgba(255,255,255,0.6); pointer-events: none; }
        .btn-status { padding: 15px; font-size: 1.2rem; font-weight: 700; border-radius: 10px; }
        
        .logo-cpm { width: 140px; max-width: 100%; height: auto; }
        .box-login-merah { background-color: #E30613 !important; color: #FFFFFF !important; }
        .box-login-merah .form-label { color: #FFFFFF !important; }

        /* TOMBOL MASUK APLIKASI: KUNING TULISAN PUTIH */
        .btn-masuk-kuning {
            background-color: #FFC107 !important;
            color: #FFFFFF !important;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-masuk-kuning:hover {
            background-color: #E0A800 !important;
            color: #FFFFFF !important;
            transform: scale(1.02);
        }

        #qr-reader { width: 100%; max-width: 340px; margin: 0 auto; border: none !important; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">
            
            <img src="https://raw.githubusercontent.com/absensicpm-sketch/ScanQR/main/logo.png" alt="Logo CPM" class="logo-cpm mb-2">
            <h4 class="fw-bold text-dark mb-4">CPM CONTROL SYSTEM</h4>

            <div id="loginSection" class="card card-custom p-4 text-start box-login-merah">
                <h5 class="fw-bold mb-3 text-center">🔐 PORTAL MASUK SISTEM</h5>
                <div id="loginAlert" class="alert alert-warning text-dark fw-bold d-none" role="alert"></div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan nama pengguna">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan kata sandi">
                </div>
                
                <button onclick="prosesLogin()" id="btnLogin" class="btn btn-masuk-kuning w-100 fw-bold py-2.5 fs-5 shadow-sm">Masuk Aplikasi</button>
            </div>

            <div id="karyawanSection" class="card card-custom p-4 bg-white text-start hidden-section">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge bg-success px-3 py-2">HAK AKSES: KARYAWAN</span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-danger fw-bold">Keluar</button>
                </div>
                
                <div id="gpsAlert" class="alert alert-warning text-center fw-bold py-2.5 mb-3">Memindai koordinat lokasi satelit GPS...</div>

                <div id="absensiForm" class="hidden-section">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cabang Kerja Terdeteksi:</label>
                        <input type="text" id="cabangAktif" class="form-control fw-bold text-success bg-light" readonly>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <input type="radio" class="btn-check" name="tipeAbsen" id="absenMasuk" value="MASUK" checked>
                            <label class="btn btn-outline-success btn-status w-100" for="absenMasuk">☀️ MASUK</label>
                        </div>
                        <div class="col">
                            <input type="radio" class="btn-check" name="tipeAbsen" id="absenPulang" value="PULANG">
                            <label class="btn btn-outline-danger btn-status w-100" for="absenPulang">🌙 PULANG</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold d-block">Scan Barcode / QR Karyawan:</label>
                        <button type="button" id="btnBukaScan" onclick="bukaScannerQR()" class="btn btn-primary w-100 fw-bold py-2 mb-2 shadow-sm">📷 Klik untuk Scan Barcode / QR</button>
                        
                        <div id="scannerContainer" class="p-2 border rounded mb-3 hidden-section text-center bg-light">
                            <div id="qr-reader"></div>
                            <button type="button" onclick="tutupScannerQR()" class="btn btn-sm btn-secondary mt-2">Batal Scan</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">ID / Nama Karyawan Terdeteksi:</label>
                        <input type="text" id="idKaryawan" class="form-control form-control-lg fw-bold text-primary bg-light" placeholder="Belum ada barcode yang di-scan" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Keterangan Tambahan (Opsional):</label>
                        <input type="text" id="keterangan" class="form-control" placeholder="Isi jika terlambat / dinas luar">
                    </div>

                    <div class="mb-4 text-center">
                        <label class="form-label d-block text-start fw-bold">Kamera Pindai Wajah Aktif:</label>
                        <div class="camera-container">
                            <video id="webcam-preview" autoplay playsinline></video>
                            <div class="camera-overlay"></div>
                            <div class="camera-grid"></div>
                        </div>
                    </div>

                    <div id="submitAlert" class="alert d-none" role="alert"></div>
                    <button onclick="kirimAbsensi()" id="btnSubmit" class="btn btn-success w-100 fw-bold py-3 fs-5 shadow">📤 VERIFIKASI & KIRIM ABSENSI</button>
                </div>
            </div>

            <p class="text-muted small mt-4">© 2026 CPM Management System</p>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzGRi4yOf8htGwfowxSyfKo3BYHpi40qLBnggdJ2_gR8DX7-Qfq__1Z3uLRpxCGWlbynA/exec";
    
    let daftarCabang = [];
    let userCoords = "";
    let cabangTerpilih = "";
    let localStream = null;
    let html5QrcodeScanner = null;

    function prosesLogin() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("btnLogin");
        const alertBox = document.getElementById("loginAlert");

        if(!user || !pass) return;
        btn.disabled = true;
        btn.innerText = "Memproses...";
        alertBox.classList.add("d-none");

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ aksi: "login", username: user, password: pass })
        })
        .then(res => res.json())
        .then(res => {
            btn.disabled = false;
            btn.innerText = "Masuk Aplikasi";
            if(res.status === "success") {
                document.getElementById("loginSection").classList.add("hidden-section");
                daftarCabang = res.cabangList;
                document.getElementById("karyawanSection").classList.remove("hidden-section");
                mulaiTrackingGPS();
                mulaiKameraSelfie();
            } else {
                alertBox.innerText = res.message;
                alertBox.classList.remove("d-none");
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerText = "Masuk Aplikasi";
            alertBox.innerText = "Koneksi server terputus/ditolak.";
            alertBox.classList.remove("d-none");
        });
    }

    /* KONTROL SCANNER QR/BARCODE KAMERA BELAKANG */
    function bukaScannerQR() {
        document.getElementById("btnBukaScan").disabled = true;
        
        // LANGKAH UTAMA: Matikan total kamera depan dan hilangkan stream-nya agar hardware lepas
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
            document.getElementById('webcam-preview').srcObject = null;
        }

        // Beri jeda 300ms agar hardware kamera benar-benar siap beralih fungsi
        setTimeout(() => {
            document.getElementById("scannerContainer").classList.remove("hidden-section");
            
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
            }
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    const idHasilScan = decodedText.toUpperCase().trim();
                    document.getElementById("idKaryawan").value = "Mencari nama untuk " + idHasilScan + "...";
                    tutupScannerQR();

                    // Cari Nama Karyawan ke Database Google Sheet
                    fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ aksi: "cariNama", idKaryawan: idHasilScan })
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === "success") {
                            document.getElementById("idKaryawan").value = idHasilScan + " - " + res.namaKaryawan;
                        } else {
                            document.getElementById("idKaryawan").value = idHasilScan + " - (Nama Tidak Terdaftar)";
                        }
                    })
                    .catch(() => {
                        document.getElementById("idKaryawan").value = idHasilScan;
                    });
                },
                (errorMessage) => { }
            ).catch(err => {
                alert("Gagal mengaktifkan kamera belakang. Pastikan izin kamera aktif.");
                tutupScannerQR();
            });
        }, 300);
    }

    function tutupScannerQR() {
        document.getElementById("btnBukaScan").disabled = false;
        if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById("scannerContainer").classList.add("hidden-section");
                mulaiKameraSelfie(); // Hidupkan kembali kamera selfie wajah depan
            }).catch(() => {
                document.getElementById("scannerContainer").classList.add("hidden-section");
                mulaiKameraSelfie();
            });
        } else {
            document.getElementById("scannerContainer").classList.add("hidden-section");
            mulaiKameraSelfie();
        }
    }

    function mulaiTrackingGPS() {
        const gpsAlert = document.getElementById("gpsAlert");
        if (!navigator.geolocation) {
            gpsAlert.innerText = "Browser tidak mendukung GPS.";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                userCoords = `${lat}, ${lng}`;
                
                let ketemuCabang = null;
                for (let cb of daftarCabang) {
                    let jarak = hitungJarakMeter(lat, lng, cb.lat, cb.lng);
                    if (jarak <= cb.radius) {
                        ketemuCabang = cb.nama;
                        break;
                    }
                }

                if (ketemuCabang) {
                    cabangTerpilih = ketemuCabang;
                    gpsAlert.className = "alert alert-success text-center fw-bold py-2.5";
                    gpsAlert.innerHTML = `✅ LOKASI VALID: <strong>${ketemuCabang}</strong>`;
                    document.getElementById("cabangAktif").value = ketemuCabang;
                    document.getElementById("absensiForm").classList.remove("hidden-section");
                } else {
                    gpsAlert.className = "alert alert-danger text-center fw-bold py-2.5";
                    gpsAlert.innerText = "❌ AKSES DITOLAK: Di luar radius cabang (" + userCoords + ")";
                }
            },
            (err) => {
                gpsAlert.innerText = "Gagal mengunci GPS. Aktifkan lokasi perangkat.";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function hitungJarakMeter(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const phi1 = lat1 * Math.PI/180;
        const phi2 = lat2 * Math.PI/180;
        const deltaPhi = (lat2-lat1) * Math.PI/180;
        const deltaLambda = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    async function mulaiKameraSelfie() {
        const videoElement = document.getElementById('webcam-preview');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(function(stream) {
                localStream = stream;
                videoElement.srcObject = stream;
            })
            .catch(function(error) {
                console.error("Gagal memuat kamera depan:", error);
            });
        }
    }

    function ambilSnapshotBase64() {
        const video = document.getElementById('webcam-preview');
        if(!video.srcObject) return "";
        const canvas = document.createElement('canvas');
        canvas.width = 480;
        canvas.height = 640;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1); 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.65);
    }

function kirimAbsensi() {
        const idKaryawan = document.getElementById("idKaryawan").value.trim();
        const tipe = document.querySelector('input[name="tipeAbsen"]:checked').value;
        const ket = document.getElementById("keterangan").value;
        const btn = document.getElementById("btnSubmit");
        const alertBox = document.getElementById("submitAlert");

        if(!idKaryawan || idKaryawan.includes("Belum ada")) {
            alert("Anda wajib melakukan Scan Barcode/QR Code terlebih dahulu!");
            return;
        }

        // --- GATHER DATA UNTUK RANGKUMAN POP-UP ---
        const namaCabang = cabangTerpilih;
        
        let namaSaja = idKaryawan;
        if (idKaryawan.includes(" - ")) {
            namaSaja = idKaryawan.split(" - ")[1].trim();
        }

        const sekarang = new Date();
        const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tanggalTeks = sekarang.toLocaleDateString('id-ID', opsiTanggal);
        const jamTeks = Thermal = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + " WIB";

        // --- SUSUN TEKS PERINGATAN POP-UP KONFIRMASI ---
        const pesanKonfirmasi = 
            "⚠️ PERIKSA KEMBALI DATA ABSENSI ANDA!\n\n" +
            "📌 Nama Karyawan : " + namaSaja + "\n" +
            "📌 Status Absen  : " + tipe + "\n" +
            "📌 Lokasi/Area   : " + namaCabang + "\n" +
            "📌 Tanggal       : " + tanggalTeks + "\n" +
            "📌 Waktu/Jam     : " + jamTeks + "\n\n" +
            "Apakah data di atas sudah benar? Klik OK untuk mengirim ke database.";

        const tanyakanUser = confirm(pesanKonfirmasi);

        if (tanyakanUser === false) {
            return; 
        }

        // JIKA DIKLIK OK, PROSES PENGIRIMAN AKTIF
        btn.disabled = true;
        alertBox.className = "alert alert-info mt-2 fw-bold";
        alertBox.innerText = "Memproses kirim data absensi...";
        alertBox.classList.remove("d-none");

        const fotoData = ambilSnapshotBase64();

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                aksi: "absen",
                idKaryawan: idKaryawan,
                tipeAbsen: tipe,
                cabang: cabangTerpilih,
                keterangan: ket,
                foto: fotoData,
                coords: userCoords
            })
        })
        .then(res => res.json())
        .then(res => {
            btn.disabled = false;
            if(res.status === "success") {
                alertBox.className = "alert alert-success mt-2 fw-bold text-center";
                alertBox.innerText = res.message;
                
                // --- LOGIKA POP-UP NOTIFIKASI SUKSES DISESUAIKAN TIPE ABSEN ---
                let salamTambahan = "";
                if (tipe === "MASUK") {
                    salamTambahan = "Selamat Bekerja..";
                } else {
                    salamTambahan = "Selamat Jalan..";
                }

                // Munculkan Pop-up Penutupan yang Ramah
                alert(
                    "🎉 Terima Kasih Absensi Anda Sudah Terekam di database CPM Management System.\n\n" + 
                    salamTambahan
                );

                // --- MODIFIKASI TERBARU: SINKRONISASI OTOMATIS LOGOUT SETELAH KLIK OK ---
                logout(); 
                
            } else {
                alertBox.className = "alert alert-danger mt-2 fw-bold";
                alertBox.innerText = res.message;
            }
        })
        .catch(err => {
            btn.disabled = false;
            alertBox.className = "alert alert-danger mt-2 fw-bold";
            alertBox.innerText = "Gagal mengirim data.";
        });
    }
    
</script>
</body>
</html>
