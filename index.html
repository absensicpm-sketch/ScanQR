<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi QR Code - Aladdin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }
        .card-absensi {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #dee2e6;
        }
        .btn-status {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        #preview-kamera {
            width: 100%;
            max-width: 320px;
            transform: scaleX(-1); /* Efek Cermin untuk Selfie */
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">
            
            <img src="https://raw.githubusercontent.com/absensicpm-sketch/repo/main/logo.png" alt="Logo Aladdin" class="img-fluid mb-3" style="max-height: 80px; onerror="this.style.display='none'">
            <h4 class="fw-bold text-dark mb-4">E-ABSENSI QR KARYAWAN</h4>

            <div class="card card-absensi p-4 bg-white mb-3">
                
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Area Penempatan / Cabang:</label>
                    <select id="areaPenempatan" class="form-select">
                        <option value="PIK">ALADDIN PIK2</option>
                        <option value="SERPONG">ALADDIN SERPONG</option>
                        <option value="HARCO MANGGA DUA">HARCO MANGGA DUA</option>
                        <option value="HONDA MUGEN">HONDA MUGEN</option>
                        <option value="WERKSPACE">WERKSPACE</option>
                    </select>
                </div>

                <div class="row mb-4">
                    <div class="col">
                        <input type="radio" class="btn-check" name="tipeAbsen" id="absenMasuk" value="MASUK" checked>
                        <label class="btn btn-outline-success btn-status w-100" for="absenMasuk">☀️ MASUK</label>
                    </div>
                    <div class="col">
                        <input type="radio" class="btn-check" name="tipeAbsen" id="absenPulang" value="PULANG">
                        <label class="btn btn-outline-danger btn-status w-100" for="absenPulang">🌙 PULANG</label>
                    </div>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Keterangan (Opsional):</label>
                    <input type="text" id="keterangan" class="form-control" placeholder="Isi jika terlambat / tugas luar">
                </div>

                <div class="mb-3 position-relative">
                    <div id="reader"></div>
                    <video id="preview-kamera" autoplay playsinline class="mx-auto mt-2"></video>
                </div>

                <div id="statusAlert" class="alert d-none" role="alert"></div>

            </div>
            
            <p class="text-muted small">© 2026 Management System Dev</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    // ==========================================
    // MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyj4Ev8Hy4OUdYyyRNyKHLf-BOQoqy1ZwEjv8zeQ6zij83LQ9vuqDN4DwNXnoNoqGAV8g/exec";

    let html5QrcodeScanner;
    let videoStream;

    // Aktifkan kamera depan latar belakang untuk mengambil foto selfie secara otomatis
    async function jalankanKameraSelfie() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            document.getElementById('preview-kamera').srcObject = videoStream;
        } catch (e) {
            console.error("Gagal mengakses kamera selfie:", e);
        }
    }

    // Mengambil snapshot dari video stream kamera depan
    function ambilFotoSelfie() {
        const video = document.getElementById('preview-kamera');
        const canvas = document.createElement('canvas');
        canvas.width = 480;
        canvas.height = 640;
        const ctx = canvas.getContext('2d');
        // Balik horizontal (mirror effect) agar foto selfie normal tidak terbalik
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.7); // Output berupa Base64 string
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Hentikan sementara scanner agar tidak terjadi double input data beruntun
        html5QrcodeScanner.clear();
        
        const area = document.getElementById("areaPenempatan").value;
        const tipe = document.querySelector('input[name="tipeAbsen"]:checked').value;
        const ket = document.getElementById("keterangan").value;
        const fotoData = ambilFotoSelfie();

        tampilkanPesan("Sedang memproses absensi, mohon tunggu...", "info");

        // Kirim Data ke Google Apps Script Web App menggunakan mode no-cors
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idKaryawan: decodedText.trim(),
                tipeAbsen: tipe,
                areaPenempatan: area,
                keterangan: ket,
                foto: fotoData
            })
        })
        .then(() => {
            // Karena mode no-cors, browser tidak membaca isi teks balikan secara langsung, 
            // namun sinyal ini menandakan data sukses terkirim ke Apps Script
            tampilkanPesan(`✅ BERHASIL! Absen ${tipe} Berhasil Tercatat.`, "success");
            document.getElementById("keterangan").value = ""; // Reset form keterangan
            
            // Nyalakan kembali scanner setelah jeda 3 detik untuk antrean karyawan berikutnya
            setTimeout(mulaiScanner, 3000);
        })
        .catch(err => {
            tampilkanPesan("❌ Gagal Mengirim Absensi: " + err, "danger");
            setTimeout(mulaiScanner, 3000);
        });
    }

    function tampilkanPesan(pesan, tipe) {
        const alertBox = document.getElementById("statusAlert");
        alertBox.className = `alert alert-${tipe} mt-2`;
        alertBox.innerHTML = pesan;
        alertBox.classList.remove("d-none");
    }

    function mulaiScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
        html5QrcodeScanner.render(onScanSuccess);
    }

    // Inisialisasi Sistem saat halaman dibuka
    window.onload = function() {
        jalankanKameraSelfie();
        mulaiScanner();
    };
</script>
</body>
</html>
