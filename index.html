<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Control System - Portal Resmi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden-section { display: none; }
        .camera-container { position: relative; width: 100%; max-width: 340px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        #webcam-preview { width: 100%; transform: scaleX(-1); background-color: #222; height: 260px; object-fit: cover; }
        .camera-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 20px solid rgba(0,0,0,0.4); box-sizing: border-box; pointer-events: none; }
        .camera-grid { position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px; border: 2px dashed rgba(255,255,255,0.6); pointer-events: none; }
        .btn-status { padding: 15px; font-size: 1.2rem; font-weight: 700; border-radius: 10px; }
        .logo-cpm { width: 140px; max-width: 100%; height: auto; }
        .box-login-merah { background-color: #E30613 !important; color: #FFFFFF !important; }
        .box-login-merah .form-label { color: #FFFFFF !important; }
        .btn-masuk-kuning { background-color: #FFC107 !important; color: #FFFFFF !important; border: none; transition: all 0.3s ease; }
        .btn-masuk-kuning:hover { background-color: #E0A800 !important; color: #FFFFFF !important; transform: scale(1.02); }
        #qr-reader, #toilet-qr-reader { width: 100%; max-width: 340px; margin: 0 auto; border: none !important; }
        
        /* Gaya Tambahan untuk Menu Pilihan */
        .btn-menu-pilihan { padding: 20px; border-radius: 15px; transition: all 0.3s ease; text-align: left; background-color: #fff; border: 2px solid #eee; }
        .btn-menu-pilihan:hover { border-color: #E30613; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYm0ZKwYi5jQthj0oPMwkP_uvnxZmKijAGRjahzDHIR3c5YPD2Z2IgChb9oImQmepPcg/exec";
    let daftarCabang = [];
    let userCoords = "";
    let cabangTerpilih = "";
    let localStream = null;
    let html5QrcodeScanner = null;
    let globalSheetId = "";
    
    // Variabel Tambahan Toilet
    let html5QrcodeScannerToilet = null;
    let scanResultToiletID = "";

function prosesLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("btnLogin");
    const alertBox = document.getElementById("loginAlert");

    if (!user || !pass) {
        alert("Username dan Password wajib diisi!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Memproses...";
    alertBox.classList.add("d-none");

    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ aksi: "login", username: user, password: pass })
    })
    .then(r => r.json())
    .then(res => {
        btn.disabled = false;
        btn.innerText = "Masuk Aplikasi";
        
        if (res.status === "success") {
            document.getElementById("loginSection").classList.add("hidden-section");

            if (res.role === "kacab") {
                document.getElementById("dashboardKacabSection").classList.remove("hidden-section");
                document.getElementById("displayAreaKacab").innerText = "Area: " + (res.area || "Tanpa Area");
                
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById("tanggalHariIni").innerText = new Date().toLocaleDateString('id-ID', options);
                
                globalSheetId = res.sheetId; 
                if (typeof muatDataMonitor === 'function') {
                    muatDataMonitor(res.area, globalSheetId);
                }
            } else if (res.role === "karyawan") {
                daftarCabang = res.cabangList;
                document.getElementById("dashboardMenuSection").classList.remove("hidden-section");
                if (typeof mulaiTrackingGPS === 'function') {
                    mulaiTrackingGPS();
                }
            } else {
                alert("Role tidak dikenali: " + res.role);
                document.getElementById("loginSection").classList.remove("hidden-section");
            }
        } else {
            alertBox.innerText = res.message;
            alertBox.classList.remove("d-none");
        }
        } else if (res.role === "karyawan") {
    console.log("Mencoba login sebagai karyawan...");
    daftarCabang = res.cabangList;
    
    let menu = document.getElementById("dashboardMenuSection");
    if (menu) {
        menu.classList.remove("hidden-section");
        console.log("Dashboard Karyawan ditampilkan.");
    } else {
        alert("Error: ID 'dashboardMenuSection' tidak ditemukan di HTML!");
    }
    
    if (typeof mulaiTrackingGPS === 'function') {
        mulaiTrackingGPS();
    } else {
        alert("Error: Fungsi mulaiTrackingGPS tidak ditemukan!");
    }
}
    })
    .catch(err => {
        btn.disabled = false;
        btn.innerText = "Masuk Aplikasi";
        alertBox.innerText = "Error koneksi: " + err.message;
        alertBox.classList.remove("d-none");
    });
}
// ...
    // CONTROLLER ROUTING NAVIGASI INTERN PORTAL
    function navigasiKeMenu(pilihan) {
        document.getElementById("dashboardMenuSection").classList.add("hidden-section");
        
        if (pilihan === "absen") {
            document.getElementById("karyawanSection").classList.remove("hidden-section");
            mulaiKameraSelfie("webcam-preview");
        } else if (pilihan === "toilet") {
            document.getElementById("toiletSection").classList.remove("hidden-section");
            document.getElementById("toiletScanContainer").classList.remove("hidden-section");
            document.getElementById("toiletForm").classList.add("hidden-section");
        }
    }

    function kembaliKeMenuUtama() {
        // Matikan semua hardware kamera
        matikanSemuaAliranKamera();
        tutupScannerQR();
        tutupScannerQRToilet();
        
        // Sembunyikan semua workspace, kembalikan dashboard menu pilihan
        document.getElementById("karyawanSection").classList.add("hidden-section");
        document.getElementById("toiletSection").classList.add("hidden-section");
        document.getElementById("dashboardMenuSection").classList.remove("hidden-section");
    }

    /* KONTROL SCANNER QR ABSENSI (ASLI) */
    function bukaScannerQR() {
        document.getElementById("btnBukaScan").disabled = true;
        matikanSemuaAliranKamera();

        setTimeout(() => {
            document.getElementById("scannerContainer").classList.remove("hidden-section");
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("qr-reader");
            }
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    const idHasilScan = decodedText.toUpperCase().trim();
                    document.getElementById("idKaryawan").value = "Mencari nama untuk " + idHasilScan + "...";
                    tutupScannerQR();

                    fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ aksi: "cariNama", idKaryawan: idHasilScan })
                    })
                    .then(res => res.json())
                    .then(res => {
                        if (res.status === "success") {
                            document.getElementById("idKaryawan").value = idHasilScan + " - " + res.namaKaryawan;
                        } else {
                            document.getElementById("idKaryawan").value = idHasilScan + " - (Nama Tidak Terdaftar)";
                        }
                    })
                    .catch(() => {
                        document.getElementById("idKaryawan").value = idHasilScan;
                    });
                },
                (errorMessage) => { }
            ).catch(err => {
                alert("Gagal mengaktifkan kamera belakang. Pastikan izin kamera aktif.");
                tutupScannerQR();
            });
        }, 300);
    }

    function tutupScannerQR() {
        document.getElementById("btnBukaScan").disabled = false;
        if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById("scannerContainer").classList.add("hidden-section");
                mulaiKameraSelfie("webcam-preview");
            }).catch(() => {
                document.getElementById("scannerContainer").classList.add("hidden-section");
                mulaiKameraSelfie("webcam-preview");
            });
        } else {
            document.getElementById("scannerContainer").classList.add("hidden-section");
            if(!document.getElementById("karyawanSection").classList.contains("hidden-section")) {
                mulaiKameraSelfie("webcam-preview");
            }
        }
    }

    /* KONTROL SCANNER QR TOILET (BARU) */
    function bukaScannerQRToilet() {
        document.getElementById("btnBukaScanToilet").disabled = true;
        matikanSemuaAliranKamera();

        setTimeout(() => {
            document.getElementById("toiletScannerBox").classList.remove("hidden-section");
            if (!html5QrcodeScannerToilet) {
                html5QrcodeScannerToilet = new Html5Qrcode("toilet-qr-reader");
            }
            
            html5QrcodeScannerToilet.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    scanResultToiletID = decodedText.trim();
                    document.getElementById("idToilet").value = scanResultToiletID;
                    
                    tutupScannerQRToilet();
                    document.getElementById("toiletScanContainer").classList.add("hidden-section");
                    document.getElementById("toiletForm").classList.remove("hidden-section");
                    mulaiKameraSelfie("toilet-webcam-preview");
                },
                (errorMessage) => { }
            ).catch(err => {
                alert("Gagal mengaktifkan kamera belakang toilet.");
                tutupScannerQRToilet();
            });
        }, 300);
    }

    function tutupScannerQRToilet() {
        document.getElementById("btnBukaScanToilet").disabled = false;
        if (html5QrcodeScannerToilet && html5QrcodeScannerToilet.isScanning) {
            html5QrcodeScannerToilet.stop().then(() => {

    /* KONTROL GPS GEOLOCATION ENGINE (ASLI) */
    function mulaiTrackingGPS() {
        const gpsAlert = document.getElementById("gpsAlert");
        if (!navigator.geolocation) {
            gpsAlert.innerText = "Browser tidak mendukung GPS.";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                userCoords = `${lat}, ${lng}`;
                
                let ketemuCabang = null;
                for (let cb of daftarCabang) {
                    let jarak = hitungJarakMeter(lat, lng, cb.lat, cb.lng);
                    if (jarak <= cb.radius) {
                        ketemuCabang = cb.nama;
                        break;
                    }
                }

                if (ketemuCabang) {
                    cabangTerpilih = ketemuCabang;
                    gpsAlert.className = "alert alert-success text-center fw-bold py-2.5";
                    gpsAlert.innerHTML = `✅ LOKASI VALID: <strong>${ketemuCabang}</strong>`;
                    document.getElementById("cabangAktif").value = ketemuCabang;
                    document.getElementById("absensiForm").classList.remove("hidden-section");
                } else {
                    gpsAlert.className = "alert alert-danger text-center fw-bold py-2.5";
                    gpsAlert.innerText = "❌ AKSES DITOLAK: Di luar radius cabang (" + userCoords + ")";
                }
            },
            (err) => {
                gpsAlert.innerText = "Gagal mengunci GPS. Aktifkan lokasi perangkat.";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function hitungJarakMeter(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const phi1 = lat1 * Math.PI/180;
        const phi2 = lat2 * Math.PI/180;
        const deltaPhi = (lat2-lat1) * Math.PI/180;
        const deltaLambda = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    /* DRIVER MANAGEMENT WEBCAM HARDWARE TRACING */
    async function mulaiKameraSelfie(idElementTarget) {
        matikanSemuaAliranKamera();
        const videoElement = document.getElementById(idElementTarget);
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(function(stream) {
                localStream = stream;
                videoElement.srcObject = stream;
            })
            .catch(function(error) {
                console.error("Gagal memuat kamera depan (" + idElementTarget + "):", error);
            });
        }
    }

    function matikanSemuaAliranKamera() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        document.getElementById('webcam-preview').srcObject = null;
        document.getElementById('toilet-webcam-preview').srcObject = null;
    }

    function ambilSnapshotBase64(idVideoSource) {
        const video = document.getElementById(idVideoSource);
        if(!video || !video.srcObject) return "";
        
        const canvas = document.createElement('canvas');
        canvas.width = 320;
        canvas.height = 240;
        
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1); 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.4); // Kompresi 0.4 agar enteng ke Sheets
    }

    /* ENGINE KIKIM ABSENSI (ASLI) */
    function kirimAbsensi() {
        const idKaryawan = document.getElementById("idKaryawan").value.trim();
        const tipe = document.querySelector('input[name="tipeAbsen"]:checked').value;
        if(!idKaryawan || idKaryawan.includes("Belum ada")) {
            alert("Anda wajib melakukan Scan Barcode/QR Code terlebih dahulu!");
            return;
        }

        const namaCabang = cabangTerpilih;
        let namaSaja = idKaryawan;
        if (idKaryawan.includes(" - ")) {
            namaSaja = idKaryawan.split(" - ")[1].trim();
        }

        const sekarang = new Date();
        const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tanggalTeks = sekarang.toLocaleDateString('id-ID', opsiTanggal);
        const jamTeks = sekarang.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + " WIB";
        
        const teksRangkuman = 
            "📌 <strong>Nama Karyawan</strong> : " + namaSaja + "\n" +
            "📌 <strong>Status Absen</strong>  : " + tipe + "\n" +
            "📌 <strong>Lokasi/Area</strong>   : " + namaCabang + "\n" +
            "📌 <strong>Tanggal</strong>       : " + tanggalTeks + "\n" +
            "📌 <strong>Waktu/Jam</strong>     : " + jamTeks + "\n\n" +
            "Apakah data di atas sudah benar? Klik <strong>KIRIM DATA</strong> untuk memproses ke database.";
            
        document.getElementById("cpmModalTitle").innerHTML = "⚠️ PERIKSA KEMBALI DATA ABSENSI";
        document.getElementById("modalHeaderBg").className = "modal-header bg-warning text-dark";
        document.getElementById("cpmModalBody").innerHTML = teksRangkuman;
        document.getElementById("cpmModalFooter").innerHTML = `
            <button type="button" class="btn btn-secondary fw-bold px-3" data-bs-dismiss="modal">❌ Batal</button>
            <button type="button" class="btn btn-primary fw-bold px-4" onclick="eksekusiKirimKeServer()">📤 Kirim Data</button>
        `;
        var myModal = new bootstrap.Modal(document.getElementById('cpmModal'));
        myModal.show();
    }

    function eksekusiKirimKeServer() {
        var modalElement = document.getElementById('cpmModal');
        var modalInstance = bootstrap.Modal.getInstance(modalElement);
        if(modalInstance) modalInstance.hide();

        const idKaryawan = document.getElementById("idKaryawan").value.trim();
        const tipe = document.querySelector('input[name="tipeAbsen"]:checked').value;
        const ket = document.getElementById("keterangan").value;
        const btn = document.getElementById("btnSubmit");
        const alertBox = document.getElementById("submitAlert");

        btn.disabled = true;
        alertBox.className = "alert alert-info mt-2 fw-bold";
        alertBox.innerText = "Memproses kirim data absensi...";
        alertBox.classList.remove("d-none");

        const fotoData = ambilSnapshotBase64('webcam-preview');
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                aksi: "absen", idKaryawan: idKaryawan, tipeAbsen: tipe, cabang: cabangTerpilih, keterangan: ket, foto: fotoData, coords: userCoords
            })
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alertBox.className = "alert alert-success mt-2 fw-bold text-center";
                alertBox.innerText = res.message;
                
                let salamTambahan = (tipe === "MASUK") ? "Selamat Bekerja.." : "Selamat Jalan..";

                setTimeout(() => {
                    document.getElementById("cpmModalTitle").innerHTML = "🎉 ABSENSI BERHASIL!";
                    document.getElementById("modalHeaderBg").className = "modal-header bg-success text-white";
                    document.getElementById("cpmModalBody").innerHTML = 
                        "Terima Kasih Absensi Anda Sudah Terekam di database CPM Management System.\n\n<strong>" + salamTambahan + "</strong>";
                    document.getElementById("cpmModalFooter").innerHTML = `
                        <button type="button" class="btn btn-success fw-bold px-5" onclick="tutupDanLogout()">OK</button>
                    `;
                    var modalSukses = new bootstrap.Modal(document.getElementById('cpmModal'));
                    modalSukses.show();
                }, 400);
                
            } else {
                btn.disabled = false;
                alertBox.className = "alert alert-danger mt-2 fw-bold";
                alertBox.innerText = res.message;
            }
        })
        .catch(err => {
            btn.disabled = false;
            alertBox.className = "alert alert-danger mt-2 fw-bold";
            alertBox.innerText = "Gagal mengirim data. Silakan periksa jaringan internet Anda.";
        });
    }

    /* SYSTEM RESET CLOSING WORKSPACE OUT GATE (ASLI & DIKEMBANGKAN) */
    function tutupDanLogout() {
        var modalElement = document.getElementById('cpmModal');
        var modalInstance = bootstrap.Modal.getInstance(modalElement);
        if (modalInstance) {
            modalInstance.hide();
        }

        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
        document.body.classList.remove('modal-open');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';

        // Reset Data Form Absen
        document.getElementById("idKaryawan").value = "";
        document.getElementById("keterangan").value = "";
        document.getElementById("btnSubmit").disabled = false;
        document.getElementById("submitAlert").classList.add("d-none");
        
        // Reset Data Form Toilet
        document.getElementById("tCatatan").value = "";
        document.getElementById("btnSubmitToilet").disabled = false;
        document.getElementById("toiletSubmitAlert").classList.add("d-none");
        scanResultToiletID = "";
        
        logout();
    }

  function logout() {
    // 1. Matikan hardware & scanner (Kode Anda sudah benar)
    matikanSemuaAliranKamera();
    if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        html5QrcodeScanner.stop();
    }
    if (html5QrcodeScannerToilet && html5QrcodeScannerToilet.isScanning) {
        html5QrcodeScannerToilet.stop();
    }

    // 2. Tambahkan pembersihan Session
    sessionStorage.clear(); // Sangat penting untuk memastikan status login hilang

    // 3. Hapus input credential
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
      
    // TAMBAHKAN INI:
    globalSheetId = "";
    cabangTerpilih = "";
    daftarCabang = [];
    userCoords = "";

    // 4. Reset tampilan semua section
    document.getElementById("karyawanSection").classList.add("hidden-section");
    document.getElementById("toiletSection").classList.add("hidden-section");
    document.getElementById("absensiForm").classList.add("hidden-section");
    document.getElementById("dashboardMenuSection").classList.add("hidden-section");
    
    // TAMBAHAN: Sembunyikan juga dashboard Kacab
    document.getElementById("dashboardKacabSection").classList.add("hidden-section");
    
    // Tampilkan kembali layar login
    document.getElementById("loginSection").classList.remove("hidden-section");
}

        console.log("Memulai proses refresh data...");
        // Mengambil area dari teks di header
        let areaText = document.getElementById("displayAreaKacab").innerText.replace("Area: ", "");
        
        // Memanggil fungsi utama untuk muat data dengan variabel globalSheetId yang sudah ada
        if(typeof globalSheetId !== 'undefined' && globalSheetId) {

function muatDataMonitor(area, sheetId) {
    console.log("Mengambil data untuk area:", area, "dengan ID:", sheetId);
    
    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
            aksi: "getMonitorHariIni",
            areaKacab: area,
            sheetId: sheetId
        })
    })
    .then(r => r.json())
    .then(res => {
        console.log("Data diterima dari server:", res);
        let tbody = document.getElementById("tabelMonitorBody");
        tbody.innerHTML = "";

        if (res.status === "success" && res.data && res.data.length > 0) {
            res.data.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>
                        <strong>${item.nama}</strong><br>
                        <button class="btn btn-sm btn-outline-primary py-0 px-2 mt-1" 
                                onclick="bukaDetailRekap('${item.nama}', '${sheetId}')">Detail</button>
                    </td>
                    <td>${item.masuk}</td>
                    <td>${item.pulang}</td>
                    <td><a href="${item.foto}" target="_blank" class="btn btn-sm btn-info text-white">Lihat</a></td>
                </tr>`;
            });
        } else {
            tbody.innerHTML = "<tr><td colspan='4' class='text-center'>Tidak ada data hari ini</td></tr>";
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("Gagal memuat data monitor.");
    });
}
